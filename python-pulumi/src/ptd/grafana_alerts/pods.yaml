# To delete these alerts, simply removing the configMap that uses this method will not work.
# Replace file contents with the following and apply in order to delete the alerts:
# apiVersion: 1
# deleteRules:
#   - orgId: 1
#     uid: crash_loop_backoff
#
# See https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/
#
# =============================================================================
# NAMESPACE FILTERING
# =============================================================================
# All pod alerts in this file are filtered to the following PTD-managed namespaces:
#
#   namespace=~"posit-team|posit-team-system|alloy|mimir|loki|grafana"
#
# This prevents false alerts from customer-deployed workloads outside PTD's control.
#
# Monitored namespaces:
#   - posit-team, posit-team-system: Application namespaces (direct customer impact)
#   - alloy, mimir, loki, grafana: Observability stack (failures cause blindness)
#
# Excluded namespaces (failures cascade to application alerts):
#   - calico-system, tigera-operator, traefik, kube-system, etc.
#   - default and customer-created namespaces
#
# To update the namespace filter, use find/replace on the regex pattern above.
# =============================================================================
apiVersion: 1
groups:
    - orgId: 1
      name: Pods
      folder: Posit Alerts
      interval: 5m
      rules:
        - uid: crash_loop_backoff
          title: CrashLoopBackoff
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                datasource:
                    type: prometheus
                    uid: mimir
                editorMode: code
                expr: count by (cluster, namespace, pod, container)(kube_pod_container_status_waiting_reason{namespace=~"posit-team|posit-team-system|alloy|mimir|loki|grafana",reason="CrashLoopBackOff"})
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - B
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                reducer: last
                refId: B
                type: reduce
            - refId: C
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: B
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Error
          for: 5m
          annotations:
            summary: "🟡 WARNING: Container Crash-Looping"
            description: |
              Container keeps crashing and restarting

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Namespace:   {{ $labels.namespace }}
              Pod:         {{ $labels.pod }}
              Container:   {{ $labels.container }}

              ─── DETAILS ─────────────────────────
              Status:      CrashLoopBackOff
              Duration:    5 minutes

          labels:
            opsgenie: "1"
          isPaused: false
        - uid: DeploymentReplicaMismatch
          title: Deployment Replicas Mismatch
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                datasource:
                    type: prometheus
                    uid: mimir
                disableTextWrap: false
                editorMode: code
                expr: kube_deployment_spec_replicas{namespace=~"posit-team|posit-team-system|alloy|mimir|loki|grafana"} != kube_deployment_status_replicas_available{namespace=~"posit-team|posit-team-system|alloy|mimir|loki|grafana"}
                fullMetaSearch: false
                includeNullMetadata: true
                instant: true
                intervalMs: 60000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
                useBackend: false
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: A
                hide: false
                reducer: last
                refId: B
                type: reduce
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: B
                hide: false
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Error
          for: 15m
          annotations:
            summary: "🟡 WARNING: Deployment Unhealthy"
            description: |
              Deployment has fewer replicas than expected

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Namespace:   {{ $labels.namespace }}
              Deployment:  {{ $labels.deployment }}

              ─── DETAILS ─────────────────────────
              Status:      Replicas mismatch
              Duration:    15 minutes

          labels:
            opsgenie: "1"
          isPaused: false
        - uid: StatefulSetReplicaMismatch
          title: Stateful Set Replicas Mismatch
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                datasource:
                    type: prometheus
                    uid: mimir
                disableTextWrap: false
                editorMode: code
                expr: kube_statefulset_status_replicas_ready{namespace=~"posit-team|posit-team-system|alloy|mimir|loki|grafana"} != kube_statefulset_status_replicas{namespace=~"posit-team|posit-team-system|alloy|mimir|loki|grafana"}
                fullMetaSearch: false
                includeNullMetadata: true
                instant: true
                intervalMs: 60000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
                useBackend: false
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: A
                hide: false
                reducer: last
                refId: B
                type: reduce
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: B
                hide: false
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Error
          for: 15m
          annotations:
            summary: "🟡 WARNING: StatefulSet Unhealthy"
            description: |
              StatefulSet has fewer replicas than expected

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Namespace:   {{ $labels.namespace }}
              StatefulSet: {{ $labels.statefulset }}

              ─── DETAILS ─────────────────────────
              Status:      Replicas mismatch
              Duration:    15 minutes

          labels:
            opsgenie: "1"
          isPaused: false
