# To delete these alerts, simply removing the configMap that uses this method will not work.
# Replace file contents with the following and apply in order to delete the alerts
# (repeat the deleteRules entry for each uid listed below):
# apiVersion: 1
# deleteRules:
#   - orgId: 1
#     uid: azure_lb_health_probe_down
#   - orgId: 1
#     uid: azure_lb_data_path_down
#   - orgId: 1
#     uid: azure_lb_snat_port_exhaustion
#
# See https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/
#
# Note: alert annotations reference {{$labels.cluster}}. For Azure Monitor-sourced metrics,
# this label is injected by the prometheus.relabel.default block in grafana_alloy.py.
# If Alloy is not running or relabeling is misconfigured, the label will be absent and
# the annotation will render as "in cluster " (blank).
apiVersion: 1
groups:
    - orgId: 1
      name: Azure Load Balancer
      folder: Posit Alerts
      interval: 5m
      rules:
        - uid: azure_lb_health_probe_down
          title: Azure Load Balancer Health Probe Down
          condition: B
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                editorMode: code
                expr: avg_over_time(azure_microsoft_network_loadbalancers_dipavailability{job="integrations/azure"}[5m])
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 100
                        type: lt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 5m
          annotations:
            summary: "🔴 CRITICAL: Azure Load Balancer Health Probe Down"
            description: |
              Load balancer backend health probe availability is below 100%

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Resource:    {{ $labels.resourceName }}
              Location:    {{ $labels.location }}

              ─── DETAILS ─────────────────────────
              Metric:      Health Probe Availability
              Current:     < 100%
              Threshold:   100%
              Duration:    5 minutes

          labels:
            opsgenie: "1"
          isPaused: false
        - uid: azure_lb_data_path_down
          title: Azure Load Balancer Data Path Down
          condition: B
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                editorMode: code
                expr: avg_over_time(azure_microsoft_network_loadbalancers_vipavailability{job="integrations/azure"}[5m])
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 100
                        type: lt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 5m
          annotations:
            summary: "🔴 CRITICAL: Azure Load Balancer Data Path Down"
            description: |
              Load balancer frontend is not responding to health probes

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Resource:    {{ $labels.resourceName }}
              Location:    {{ $labels.location }}

              ─── DETAILS ─────────────────────────
              Metric:      Data Path Availability
              Current:     < 100%
              Threshold:   100%
              Duration:    5 minutes

          labels:
            opsgenie: "1"
          isPaused: false
        - uid: azure_lb_snat_port_exhaustion
          title: Azure Load Balancer SNAT Port Exhaustion
          condition: B
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                editorMode: code
                expr: |
                  (avg_over_time(azure_microsoft_network_loadbalancers_usedsnatports{job="integrations/azure"}[5m])
                  /
                  avg_over_time(azure_microsoft_network_loadbalancers_allocatedsnatports{job="integrations/azure"}[5m])) * 100
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 80
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 5m
          annotations:
            summary: "🟡 WARNING: Azure Load Balancer SNAT Port Exhaustion"
            description: |
              Load balancer is using more than 80% of allocated SNAT ports

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Resource:    {{ $labels.resourceName }}
              Location:    {{ $labels.location }}

              ─── DETAILS ─────────────────────────
              Metric:      SNAT Port Utilization
              Current:     > 80%
              Threshold:   80%
              Duration:    5 minutes
              Impact:      May cause outbound connection failures

          labels:
            opsgenie: "1"
          isPaused: false
