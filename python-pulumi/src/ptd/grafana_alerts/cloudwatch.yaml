# To delete these alerts, simply removing the configMap that uses this method will not work.
# Replace file contents with the following and apply in order to delete the alerts:
# apiVersion: 1
# deleteRules:
#   - orgId: 1
#     uid: fsx_capacity_warning
#   - orgId: 1
#     uid: fsx_capacity_critical
#
# See https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/
apiVersion: 1
deleteRules:
    - orgId: 1
      uid: fsx_capacity
    - orgId: 1
      uid: ec2_network_out_high
    - orgId: 1
      uid: ec2_network_packets_out_high
groups:
    - orgId: 1
      name: Cloudwatch
      folder: Posit Alerts
      interval: 5m
      rules:
        - uid: fsx_capacity_warning
          title: FSx Capacity Warning
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                editorMode: code
                expr: aws_fsx_used_storage_capacity_average{job="integrations/cloudwatch", dimension_DataType!="Snapshot", dimension_VolumeId!=""} / aws_fsx_storage_capacity_average{job="integrations/cloudwatch", dimension_VolumeId!=""}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0.8
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 5m
          annotations:
            summary: "🟡 WARNING: FSx Storage Capacity Low"
            description: |
              FSx file system is running low on storage capacity

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Resource:    {{ $labels.dimension_FileSystemId }}
              Region:      {{ $labels.region }}

              ─── DETAILS ─────────────────────────
              Metric:      Storage Capacity
              Current:     > 80% used
              Threshold:   80%
              Duration:    5 minutes

          labels:
            opsgenie: "1"
          isPaused: false
        - uid: fsx_capacity_critical
          title: FSx Capacity Critical
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                editorMode: code
                expr: aws_fsx_used_storage_capacity_average{job="integrations/cloudwatch", dimension_DataType!="Snapshot", dimension_VolumeId!=""} / aws_fsx_storage_capacity_average{job="integrations/cloudwatch", dimension_VolumeId!=""}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0.9
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 5m
          annotations:
            summary: "🔴 CRITICAL: FSx Storage Capacity Critical"
            description: |
              FSx file system storage capacity is critically low

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Resource:    {{ $labels.dimension_FileSystemId }}
              Region:      {{ $labels.region }}

              ─── DETAILS ─────────────────────────
              Metric:      Storage Capacity
              Current:     > 90% used
              Threshold:   90%
              Duration:    5 minutes

          labels:
            opsgenie: "1"
          isPaused: false
