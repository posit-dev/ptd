# To delete these alerts, simply removing the configMap that uses this method will not work.
# Replace file contents with the following and apply in order to delete the alerts
# (repeat the deleteRules entry for each uid listed below):
# apiVersion: 1
# deleteRules:
#   - orgId: 1
#     uid: azure_postgres_cpu_high
#   - orgId: 1
#     uid: azure_postgres_storage_high
#   - orgId: 1
#     uid: azure_postgres_memory_high
#   - orgId: 1
#     uid: azure_postgres_connections_high
#   - orgId: 1
#     uid: azure_postgres_failed_connections
#   - orgId: 1
#     uid: azure_postgres_deadlocks
#
# See https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/
#
# Note: alert annotations reference {{$labels.cluster}}. For Azure Monitor-sourced metrics,
# this label is injected by the prometheus.relabel.default block in lib/steps/helm_helpers.go (buildAlloyConfig).
# If Alloy is not running or relabeling is misconfigured, the label will be absent and
# the annotation will render as "in cluster " (blank).
apiVersion: 1
deleteRules:
  - orgId: 1
    uid: azure_postgres_deadlocks
groups:
    - orgId: 1
      name: Azure PostgreSQL
      folder: Posit Alerts
      interval: 5m
      rules:
        - uid: azure_postgres_cpu_high
          title: Azure PostgreSQL CPU High
          condition: B
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                editorMode: code
                expr: azure_microsoft_dbforpostgresql_flexibleservers_cpu_percent_average_percent{job="integrations/azure"}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 80
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          noDataState: NoData  # Performance metric; silent suppression on scrape outage is acceptable
          execErrState: Error
          for: 10m
          annotations:
            summary: "🟡 WARNING: Azure PostgreSQL CPU High"
            description: |
              PostgreSQL Flexible Server CPU utilization is above 80%

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Resource:    {{ $labels.resourceName }}
              Location:    {{ $labels.location }}

              ─── DETAILS ─────────────────────────
              Metric:      CPU Utilization
              Current:     > 80%
              Threshold:   80%
              Duration:    10 minutes

          labels:
            opsgenie: "1"
          isPaused: false
        - uid: azure_postgres_storage_high
          title: Azure PostgreSQL Storage High
          condition: B
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                editorMode: code
                expr: azure_microsoft_dbforpostgresql_flexibleservers_storage_percent_average_percent{job="integrations/azure"}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 80
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          noDataState: Alerting  # Storage exhaustion is latent; alert even when scraping stops so we don't silently miss a full disk
          execErrState: Error
          for: 5m
          annotations:
            summary: "🟡 WARNING: Azure PostgreSQL Storage High"
            description: |
              PostgreSQL Flexible Server storage utilization is above 80%

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Resource:    {{ $labels.resourceName }}
              Location:    {{ $labels.location }}

              ─── DETAILS ─────────────────────────
              Metric:      Storage Utilization
              Current:     > 80%
              Threshold:   80%
              Duration:    5 minutes

              Note: On new deployments, noDataState=Alerting may produce
              a false positive during Azure Monitor initialization (first 5m)

          labels:
            opsgenie: "1"
          isPaused: false
        - uid: azure_postgres_memory_high
          title: Azure PostgreSQL Memory High
          condition: B
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                editorMode: code
                expr: azure_microsoft_dbforpostgresql_flexibleservers_memory_percent_average_percent{job="integrations/azure"}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 80
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          noDataState: Alerting  # Memory exhaustion is latent; alert even when scraping stops so we don't silently miss an OOM condition
          execErrState: Error
          for: 10m
          annotations:
            summary: "🟡 WARNING: Azure PostgreSQL Memory High"
            description: |
              PostgreSQL Flexible Server memory utilization is above 80%

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Resource:    {{ $labels.resourceName }}
              Location:    {{ $labels.location }}

              ─── DETAILS ─────────────────────────
              Metric:      Memory Utilization
              Current:     > 80%
              Threshold:   80%
              Duration:    10 minutes

          labels:
            opsgenie: "1"
          isPaused: false
        - uid: azure_postgres_connections_high
          title: Azure PostgreSQL Connections High
          condition: B
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                editorMode: code
                expr: azure_microsoft_dbforpostgresql_flexibleservers_active_connections_average_count{job="integrations/azure"}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 500  # Calibrated for mid-size SKUs (e.g., Standard_D4s_v3). Adjust per SKU; smaller SKUs may have lower connection limits.
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          noDataState: NoData  # Performance metric; silent suppression on scrape outage is acceptable
          execErrState: Error
          for: 5m
          annotations:
            summary: "🟡 WARNING: Azure PostgreSQL Connections High"
            description: |
              PostgreSQL Flexible Server has more than 500 active connections

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Resource:    {{ $labels.resourceName }}
              Location:    {{ $labels.location }}

              ─── DETAILS ─────────────────────────
              Metric:      Active Connections
              Current:     > 500
              Threshold:   500
              Duration:    5 minutes

              Note: Threshold calibrated for mid-size SKUs; may need
              adjustment for smaller or larger instance sizes

          labels:
            opsgenie: "1"
            instance_size_dependent: "true"  # Silence this label for known-small instance classes
          isPaused: true  # Paused until a Grafana silence or Alertmanager inhibit rule is configured for the instance_size_dependent label
        - uid: azure_postgres_failed_connections
          title: Azure PostgreSQL Failed Connections
          condition: B
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: mimir
              model:
                editorMode: code
                expr: azure_microsoft_dbforpostgresql_flexibleservers_connections_failed_total_count{job="integrations/azure"}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 10
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 5m
          annotations:
            summary: "🟡 WARNING: Azure PostgreSQL Failed Connections"
            description: |
              PostgreSQL Flexible Server has more than 10 failed connection attempts

              ─── WHERE ───────────────────────────
              Tenant:      {{ $labels.tenant_name }}
              Cluster:     {{ $labels.cluster }}
              Resource:    {{ $labels.resourceName }}
              Location:    {{ $labels.location }}

              ─── DETAILS ─────────────────────────
              Metric:      Failed Connections
              Current:     > 10
              Threshold:   10
              Duration:    5 minutes
              Impact:      Potential authentication or connectivity issues

          labels:
            opsgenie: "1"
          isPaused: false
